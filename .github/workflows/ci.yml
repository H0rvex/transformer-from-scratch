name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      - name: Ruff
        run: ruff check src tests scripts app
      - name: Ruff format check
        run: ruff format --check src tests scripts app
      - name: Mypy
        run: mypy src/transformer
      - name: Pytest
        run: pytest -q -m "not gpu"
      - name: Benchmark table (CPU)
        run: python scripts/benchmark.py --repeats 10 --warmup 3
