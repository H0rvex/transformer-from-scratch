name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: |
          python -m pip install -U pip pip-audit
          pip install -e ".[dev]"
      - name: Pip audit
        run: pip-audit --desc on || true
      - name: Ruff
        run: ruff check src tests scripts app
      - name: Ruff format check
        run: ruff format --check src tests scripts app
      - name: Mypy
        run: mypy src/transformer
      - name: Pytest + coverage
        run: pytest -q -m "not gpu" --cov=transformer --cov-report=xml --cov-report=term-missing
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.10'
        continue-on-error: true
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
      - name: Benchmark table (CPU)
        run: python scripts/benchmark.py --repeats 10 --warmup 3
